name: Build & Deploy Update

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - run: npm install

      - name: Disable SSR
        run: |
          jq 'del(.projects.app.architect.build.options.server, .projects.app.architect.build.options.ssr, .projects.app.architect.build.options.outputMode, .projects.app.architect.build.options.prerender)' angular.json > angular.tmp.json
          mv angular.tmp.json angular.json
          rm -f src/main.server.ts src/app/app.config.server.ts src/server.ts || true

      - name: Build Angular
        run: npx ng build --configuration production --base-href ./

      - name: Install Vercel
        run: npm install -g vercel

      # 🔥 FIX สำคัญ: กำหนด project name เอง
      - name: Deploy to Vercel
        run: |
          vercel --prod --yes \
          --name korat-transit \
          --token=${{ secrets.VERCEL_TOKEN }}
